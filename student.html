<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>رحلتي مع جزء عم</title>

<style>
body{
    margin:0;
    background:#f7f2e3;
    font-family:Tahoma;
    text-align:center;
}

h1{
    color:#8b6f00;
    margin-top:15px;
}

/* اللوحة */
.board{
    position:relative;
    width:100%;
    max-width:420px;
    height:1100px;
    margin:auto;
}

/* النجمة */
.star{
    position:absolute;
    width:70px;
    height:70px;
    background:#ddd;
    clip-path: polygon(
        50% 0%, 61% 35%, 98% 35%, 
        68% 57%, 79% 91%, 
        50% 70%, 21% 91%, 
        32% 57%, 2% 35%, 
        39% 35%
    );
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    cursor:pointer;
}

.star.done{
    background:gold;
}

/* النص داخل النجمة */
.star span{
    text-align:center;
    padding:4px;
}

/* الكأس */
.trophy{
    position:absolute;
    font-size:30px;
    cursor:pointer;
    opacity:0.4;
}

.trophy.active{
    opacity:1;
    filter:drop-shadow(0 0 5px gold);
}

/* الوسام */
.badge{
    position:absolute;
    font-size:28px;
    cursor:pointer;
    opacity:0.4;
}

.badge.active{
    opacity:1;
    filter:drop-shadow(0 0 5px gold);
}

.back{
    margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">⬅ رجوع</div>
<h1 id="studentName"></h1>

<div class="board" id="board"></div>

<script>

const surahs = [
"الناس","الفلق","الإخلاص","المسد","النصر","الكافرون",
"الكوثر","الماعون","قريش","الفيل","الهمزة","العصر",
"التكاثر","القارعة","العاديات","الزلزلة","البينة","القدر",
"العلق","التين","الشرح","الضحى","الليل","الشمس",
"البلد","الفجر","الغاشية","الأعلى","الطارق","البروج",
"الإنشقاق","المطففين","الإنفطار","التكوير","عبس","النازعات","النبأ"
];

const positions = [
/* الصف 1 */
[20,120],[90,120],[160,120],[230,120],[300,120],[370,120],

/* الصف 2 */
[370,230],[300,230],[230,230],[160,230],[90,230],[20,230],

/* الصف 3 */
[20,340],[90,340],[160,340],[230,340],[300,340],[370,340],

/* الصف 4 */
[370,450],[300,450],[230,450],[160,450],[90,450],[20,450],

/* الصف 5 */
[20,560],[90,560],[160,560],[230,560],[300,560],[370,560],

/* الصف 6 */
[370,670],[300,670],[230,670],[160,670],[90,670],[20,670],

/* الصف 7 */
[200,800]
];

const params = new URLSearchParams(window.location.search);
const student = params.get("name");

document.getElementById("studentName").textContent = "⭐ " + student;

/* التخزين */
const key = student + "_stars";
let done = JSON.parse(localStorage.getItem(key)) || [];

const board = document.getElementById("board");

/* رسم النجوم */
surahs.forEach((name,i)=>{
    const star = document.createElement("div");
    star.className="star";

    if(done.includes(i)){
        star.classList.add("done");
    }

    star.style.left = positions[i][0] + "px";
    star.style.top = positions[i][1] + "px";

    const text = document.createElement("span");
    text.textContent=name;

    star.appendChild(text);

    star.onclick=()=>{
        if(done.includes(i)){
            done = done.filter(x=>x!==i);
        }else{
            done.push(i);
        }
        localStorage.setItem(key, JSON.stringify(done));
        star.classList.toggle("done");
    };

    board.appendChild(star);
});

/* الكؤوس */
const trophiesPos = [
[390,200],[10,420],[390,620]
];

trophiesPos.forEach((pos,i)=>{
    const t = document.createElement("div");
    t.className="trophy";
    t.textContent="🏆";

    t.style.left=pos[0]+"px";
    t.style.top=pos[1]+"px";

    t.onclick=()=> t.classList.toggle("active");

    board.appendChild(t);
});

/* الأوسمة */
const badgesPos = [
[10,200],[390,420],[10,620]
];

badgesPos.forEach((pos,i)=>{
    const b = document.createElement("div");
    b.className="badge";
    b.textContent="🎖️";

    b.style.left=pos[0]+"px";
    b.style.top=pos[1]+"px";

    b.onclick=()=> b.classList.toggle("active");

    board.appendChild(b);
});

function goBack(){
    window.location.href="index.html";
}

</script>

</body>
</html>
