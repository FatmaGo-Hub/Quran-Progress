<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>رحلتي مع جزء </title>

<style>
body{
    font-family:Tahoma;
    background:#f7f2e3;
    text-align:center;
    padding:20px;
}

h1{
    color:#8b6f00;
}

/* الصف */
.row{
    display:flex;
    justify-content:center;
    gap:15px;
    margin:60px 0;
    align-items:center;
}

/* النجمة */
.star-box{
    width:80px;
    height:80px;
    position:relative;
    cursor:pointer;
}

.star{
    width:100%;
    height:100%;
    background:#ddd;
    clip-path: polygon(
        50% 0%, 61% 35%, 98% 35%, 
        68% 57%, 79% 91%, 
        50% 70%, 21% 91%, 
        32% 57%, 2% 35%, 
        39% 35%
    );
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    padding:5px;
}

.star span{
    text-align:center;
}

.done .star{
    background:gold;
}

/* الكأس */
.trophy{
    font-size:40px;
    cursor:pointer;
    opacity:0.4;
    transition:0.3s;
}

.trophy.active{
    opacity:1;
    filter:drop-shadow(0 0 5px gold);
}

/* الوسام */
.badge{
    font-size:35px;
    cursor:pointer;
    opacity:0.4;
    transition:0.3s;
}

.badge.active{
    opacity:1;
    filter:drop-shadow(0 0 5px gold);
}

/* رجوع */
.back{
    cursor:pointer;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">⬅ رجوع</div>
<h1 id="studentName"></h1>

<div id="container"></div>

<script>

const surahs = [
"الناس","الفلق","الإخلاص","المسد","النصر","الكافرون",
"الكوثر","الماعون","قريش","الفيل","الهمزة","العصر",
"التكاثر","القارعة","العاديات","الزلزلة","البينة","القدر",
"العلق","التين","الشرح","الضحى","الليل","الشمس",
"البلد","الفجر","الغاشية","الأعلى","الطارق","البروج",
"الإنشقاق","المطففين","الإنفطار","التكوير","عبس","النازعات","النبأ"
];

const params = new URLSearchParams(window.location.search);
const student = params.get("name");

document.getElementById("studentName").textContent = "⭐ " + student;

/* تخزين */
const starKey = student + "_stars";
const trophyKey = student + "_trophies";
const badgeKey = student + "_badges";

let done = JSON.parse(localStorage.getItem(starKey)) || [];
let trophies = JSON.parse(localStorage.getItem(trophyKey)) || [];
let badges = JSON.parse(localStorage.getItem(badgeKey)) || [];

const container = document.getElementById("container");

const perRow = Math.ceil(surahs.length / 7);

function render(){
    container.innerHTML="";

    for(let r=0; r<7; r++){

        const row = document.createElement("div");
        row.className="row";

        const start = r * perRow;
        const end = start + perRow;

        /* 🏆 كأس في بداية بعض الصفوف */
        if(r % 2 === 1){
            const trophy = document.createElement("div");
            trophy.className="trophy";
            trophy.textContent="🏆";

            if(trophies.includes(r)){
                trophy.classList.add("active");
            }

            trophy.onclick=()=>{
                if(trophies.includes(r)){
                    trophies = trophies.filter(i=>i!==r);
                }else{
                    trophies.push(r);
                }
                localStorage.setItem(trophyKey, JSON.stringify(trophies));
                render();
            };

            row.appendChild(trophy);
        }

        surahs.slice(start,end).forEach((name,index)=>{

            const realIndex = start + index;

            const box = document.createElement("div");
            box.className="star-box";

            const star = document.createElement("div");
            star.className="star";

            const text = document.createElement("span");
            text.textContent=name;

            star.appendChild(text);
            box.appendChild(star);

            if(done.includes(realIndex)){
                box.classList.add("done");
            }

            box.onclick=()=>{
                if(done.includes(realIndex)){
                    done = done.filter(i=>i!==realIndex);
                }else{
                    done.push(realIndex);
                }
                localStorage.setItem(starKey, JSON.stringify(done));
                render();
            };

            row.appendChild(box);
        });

        /* 🎖️ وسام في نهاية بعض الصفوف */
        if(r % 2 === 0){
            const badge = document.createElement("div");
            badge.className="badge";
            badge.textContent="🎖️";

            if(badges.includes(r)){
                badge.classList.add("active");
            }

            badge.onclick=()=>{
                if(badges.includes(r)){
                    badges = badges.filter(i=>i!==r);
                }else{
                    badges.push(r);
                }
                localStorage.setItem(badgeKey, JSON.stringify(badges));
                render();
            };

            row.appendChild(badge);
        }

        container.appendChild(row);
    }
}

function goBack(){
    window.location.href="index.html";
}

render();

</script>

</body>
</html>
