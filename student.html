<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>رحلتي مع جزء عم</title>

<style>
body{
    font-family:Tahoma;
    background:#f8f1dc;
    text-align:center;
    padding:20px;
}

/* العنوان */
h1{
    color:#8b6f00;
    margin-bottom:10px;
}

/* رجوع */
.back{
    cursor:pointer;
    color:#555;
    margin-bottom:10px;
}

/* المسار */
.path-container{
    position:relative;
    max-width:700px;
    margin:auto;
}

/* الخط المتعرج */
.line{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
}

.line svg{
    width:100%;
    height:100%;
}

path{
    fill:none;
    stroke:#c8b6e2;
    stroke-width:4;
    stroke-dasharray:10,10;
}

/* الصف */
.row{
    display:flex;
    justify-content:space-between;
    margin:50px 0;
    position:relative;
    z-index:1;
}

.row.reverse{
    flex-direction:row-reverse;
}

/* النجوم */
.surah{
    width:80px;
    text-align:center;
    cursor:pointer;
}

.star{
    font-size:30px;
    color:#ccc;
    transition:0.3s;
}

.name{
    font-size:11px;
}

.completed .star{
    color:gold;
    text-shadow:0 0 10px gold;
}

.surah:hover{
    transform:scale(1.2);
}

/* الكأس */
.trophy{
    font-size:28px;
}

/* الوسام */
.badge{
    font-size:26px;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">⬅ رجوع</div>

<h1 id="studentName"></h1>

<div class="path-container">

    <div class="line">
        <svg viewBox="0 0 500 1500" preserveAspectRatio="none">
            <path d="
                M250 0 
                Q450 100 250 200
                Q50 300 250 400
                Q450 500 250 600
                Q50 700 250 800
                Q450 900 250 1000
                Q50 1100 250 1200
                Q450 1300 250 1400
            "/>
        </svg>
    </div>

    <div id="path"></div>

</div>

<script>

const surahs = [
"الناس","الفلق","الإخلاص","المسد","النصر","الكافرون",
"الكوثر","الماعون","قريش","الفيل","الهمزة","العصر",
"التكاثر","القارعة","العاديات","الزلزلة","البينة","القدر",
"العلق","التين","الشرح","الضحى","الليل","الشمس",
"البلد","الفجر","الغاشية","الأعلى","الطارق","البروج",
"الإنشقاق","المطففين","الإنفطار","التكوير","عبس","النازعات","النبأ"
];

const params = new URLSearchParams(window.location.search);
const student = params.get("name");

document.getElementById("studentName").textContent = "⭐ " + student;

let completed = JSON.parse(localStorage.getItem(student)) || [];

const pathDiv = document.getElementById("path");

function render(){
    pathDiv.innerHTML="";
    const perRow = 4;
    let rowIndex = 0;

    for(let i=0;i<surahs.length;i+=perRow){

        const row = document.createElement("div");
        row.classList.add("row");

        if(rowIndex % 2 !== 0){
            row.classList.add("reverse");
        }

        surahs.slice(i,i+perRow).forEach((name,index)=>{

            const realIndex = i+index;

            const div = document.createElement("div");
            div.classList.add("surah");

            const star = document.createElement("div");
            star.classList.add("star");
            star.textContent="★";

            const label = document.createElement("div");
            label.classList.add("name");
            label.textContent=name;

            div.appendChild(star);
            div.appendChild(label);

            if(completed.includes(realIndex)){
                div.classList.add("completed");
            }

            div.onclick = ()=>{
                if(completed.includes(realIndex)){
                    completed = completed.filter(x=>x!==realIndex);
                }else{
                    completed.push(realIndex);
                }

                localStorage.setItem(student, JSON.stringify(completed));
                render();
            };

            row.appendChild(div);
        });

        /* إضافة جوائز */
        if(i>0 && i%8===0){
            const trophy = document.createElement("div");
            trophy.classList.add("trophy");
            trophy.textContent="🏆";
            row.appendChild(trophy);
        }

        if(i>0 && i%12===0){
            const badge = document.createElement("div");
            badge.classList.add("badge");
            badge.textContent="🎖️";
            row.appendChild(badge);
        }

        pathDiv.appendChild(row);
        rowIndex++;
    }
}

function goBack(){
    window.location.href="index.html";
}

render();

</script>

</body>
</html>
